{% extends "base.html" %}

{% block content %}
<section class="section-header">
  <div>
    <h1>{{ t("settings_title") }}</h1>
    <p>{{ t("settings_subtitle") }}</p>
  </div>
</section>

{% if error %}
<div class="alert">{{ error }}</div>
{% endif %}

<form class="settings-form" method="post" action="/settings">
  <label class="toggle-row">
    <input type="checkbox" name="zero_export_enabled" value="true" {% if settings.zero_export_enabled %}checked{% endif %}>
    <span>{{ t("zero_export") }}</span>
  </label>

  <div class="form-grid">
    <label>{{ t("language") }}
      <select name="ui_language">
        {% for code, label in languages.items() %}
        <option value="{{ code }}" {% if settings.ui_language == code %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label>{{ t("target_grid_power") }}
      <input type="number" name="target_grid_power_w" value="{{ settings.target_grid_power_w }}" step="1">
    </label>
    <label>{{ t("deadband_min") }}
      <input type="number" name="grid_power_band_min_w" value="{{ settings.grid_power_band_min_w }}" step="1">
    </label>
    <label>{{ t("deadband_max") }}
      <input type="number" name="grid_power_band_max_w" value="{{ settings.grid_power_band_max_w }}" step="1">
    </label>
    <label>{{ t("control_interval") }}
      <input type="number" name="control_interval_seconds" value="{{ settings.control_interval_seconds }}" min="1" step="1">
    </label>
    <label>{{ t("min_output_change") }}
      <input type="number" name="min_output_change_w" value="{{ settings.min_output_change_w }}" min="0" step="1">
    </label>
    <label>{{ t("output_step") }}
      <input type="number" name="output_step_w" value="{{ settings.output_step_w }}" min="1" step="1">
    </label>
    <label>{{ t("max_output_power") }}
      <input type="number" name="max_output_power_w" value="{{ settings.max_output_power_w }}" min="0" step="1">
    </label>
    <label>{{ t("min_output_power") }}
      <input type="number" name="min_output_power_w" value="{{ settings.min_output_power_w }}" min="0" step="1">
    </label>
    <label>{{ t("min_soc") }}
      <input type="number" name="min_soc_percent" value="{{ settings.min_soc_percent }}" min="0" max="100" step="1">
    </label>
    <label>{{ t("stale_measurement") }}
      <input type="number" name="stale_measurement_seconds" value="{{ settings.stale_measurement_seconds }}" min="1" step="1">
    </label>
  </div>

  <button class="primary-button" type="submit">{{ t("save") }}</button>
</form>
{% endblock %}
