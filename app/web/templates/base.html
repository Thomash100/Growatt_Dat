<!doctype html>
<html lang="{{ language }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Growatt Local Gateway</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Growatt Local Gateway</a>
      <nav class="nav">
        <a href="/">{{ t("nav_dashboard") }}</a>
        <a href="/live">{{ t("nav_live") }}</a>
        <a href="/settings">{{ t("nav_settings") }}</a>
        <a href="/logs">{{ t("nav_logs") }}</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}
      <script>
        window.GLG_I18N = {{ i18n | tojson }};
      </script>
      <script src="/static/app.js"></script>
    {% endblock %}
  </body>
</html>
